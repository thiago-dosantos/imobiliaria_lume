name: imobiliaria_lume
description: "Projeto de aplicativo para Imobiliária by Thiago."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  image_picker: ^1.0.7
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.0
  path: ^1.9.0
  dropdown_button2: ^2.3.9

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"

flutter_native_splash:
  color: "#ffffff"           
  image: "assets/images/splash.png"
  android: true
  ios: true

flutter:

  uses-material-design: true
